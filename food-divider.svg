<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 96" preserveAspectRatio="xMidYMid meet" role="img" aria-label="">
  <defs>
    <style>
      .stem { fill: none; stroke: #2d6a4f; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .stem-soft { fill: none; stroke: #40916c; stroke-width: 1.3; stroke-linecap: round; opacity: 0.55; }
      .doodle { fill: #d8f3dc; stroke: #2d6a4f; stroke-width: 1.35; stroke-linecap: round; stroke-linejoin: round; }
      .doodle-alt { fill: #b7e4c7; stroke: #2d6a4f; stroke-width: 1.35; stroke-linecap: round; stroke-linejoin: round; }
      .doodle-accent { fill: #fffaf4; stroke: #40916c; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
      .leaf { fill: #b7e4c7; stroke: #2d6a4f; stroke-width: 1.1; }
      .dot { fill: #40916c; opacity: 0.45; }
    </style>
  </defs>

  <!-- Central garden line -->
  <path class="stem-soft" d="M24 50 C200 38, 380 58, 560 46 S920 36, 1176 48"/>
  <path class="stem" d="M16 48 C140 42, 280 54, 420 46 C580 38, 740 52, 900 44 C1020 40, 1100 46, 1184 48"/>

  <!-- Scattered micro leaves -->
  <ellipse class="leaf" cx="95" cy="42" rx="6" ry="3.5" transform="rotate(-20 95 42)"/>
  <ellipse class="leaf" cx="310" cy="58" rx="5" ry="3" transform="rotate(15 310 58)"/>
  <ellipse class="leaf" cx="710" cy="40" rx="5.5" ry="3" transform="rotate(-12 710 40)"/>
  <ellipse class="leaf" cx="1010" cy="54" rx="6" ry="3.2" transform="rotate(22 1010 54)"/>
  <circle class="dot" cx="180" cy="52" r="2"/>
  <circle class="dot" cx="500" cy="44" r="1.8"/>
  <circle class="dot" cx="820" cy="56" r="2"/>
  <circle class="dot" cx="1080" cy="46" r="1.6"/>

  <!-- Carrot -->
  <g transform="translate(72 28)">
    <path class="doodle" d="M14 38 L22 8 L30 38 Z"/>
    <path class="doodle-alt" d="M18 8 C16 2, 22 0, 24 6"/>
    <path class="doodle-alt" d="M24 6 C26 0, 32 2, 30 8"/>
    <path class="stem-soft" d="M22 8 L24 2 M26 8 L28 3"/>
  </g>

  <!-- Apple -->
  <g transform="translate(188 26)">
    <circle class="doodle" cx="18" cy="22" r="16"/>
    <path class="doodle-alt" d="M18 6 L18 2"/>
    <path class="leaf" d="M18 4 C22 0, 28 2, 24 8 C20 10, 16 8, 18 4 Z"/>
  </g>

  <!-- Leafy greens bunch -->
  <g transform="translate(298 24)">
    <path class="doodle" d="M8 40 L20 12 L32 40 Z" opacity="0.9"/>
    <path class="doodle-alt" d="M4 36 C0 28, 8 20, 14 28 C10 34, 6 38, 4 36 Z"/>
    <path class="doodle-alt" d="M36 36 C40 26, 32 18, 26 28 C30 34, 34 38, 36 36 Z"/>
    <path class="leaf" d="M18 10 C14 4, 20 2, 22 8 C20 12, 16 12, 18 10 Z"/>
  </g>

  <!-- Tomato -->
  <g transform="translate(408 28)">
    <circle class="doodle" cx="18" cy="22" r="14"/>
    <path class="doodle-alt" d="M10 14 C14 8, 18 6, 22 8 C26 10, 24 14, 18 12 C14 14, 10 14, 10 14 Z"/>
    <path class="stem-soft" d="M18 8 L18 4"/>
    <ellipse class="leaf" cx="22" cy="6" rx="4" ry="2.5" transform="rotate(30 22 6)"/>
  </g>

  <!-- Bell pepper -->
  <g transform="translate(518 24)">
    <path class="doodle" d="M10 40 C8 28, 12 14, 20 10 C28 14, 32 28, 30 40 C26 42, 14 42, 10 40 Z"/>
    <path class="doodle-accent" d="M16 10 C18 6, 22 6, 24 10 L22 14 L18 14 Z"/>
    <path class="stem-soft" d="M20 10 L20 6"/>
  </g>

  <!-- Broccoli -->
  <g transform="translate(628 26)">
    <path class="doodle" d="M16 40 L16 26"/>
    <circle class="doodle-alt" cx="10" cy="18" r="8"/>
    <circle class="doodle-alt" cx="22" cy="16" r="9"/>
    <circle class="doodle" cx="16" cy="12" r="10"/>
    <circle class="doodle-accent" cx="14" cy="20" r="5"/>
    <circle class="doodle-accent" cx="20" cy="18" r="5"/>
  </g>

  <!-- Wheat / grain -->
  <g transform="translate(738 22)">
    <path class="stem-soft" d="M16 44 L16 18"/>
    <ellipse class="doodle" cx="12" cy="16" rx="3" ry="5" transform="rotate(-25 12 16)"/>
    <ellipse class="doodle" cx="16" cy="12" rx="3" ry="5"/>
    <ellipse class="doodle" cx="20" cy="16" rx="3" ry="5" transform="rotate(25 20 16)"/>
    <ellipse class="doodle-alt" cx="10" cy="22" rx="2.5" ry="4.5" transform="rotate(-30 10 22)"/>
    <ellipse class="doodle-alt" cx="22" cy="22" rx="2.5" ry="4.5" transform="rotate(30 22 22)"/>
    <ellipse class="doodle-alt" cx="16" cy="8" rx="2.5" ry="4"/>
  </g>

  <!-- Corn -->
  <g transform="translate(848 26)">
    <path class="doodle" d="M12 40 C12 16, 28 12, 28 40 Z"/>
    <path class="doodle-accent" d="M16 20 L16 24 M20 18 L20 22 M24 20 L24 24 M16 28 L16 32 M20 26 L20 30 M24 28 L24 32" stroke-width="1" fill="none"/>
    <path class="leaf" d="M8 18 C4 10, 10 6, 14 12"/>
    <path class="leaf" d="M30 16 C34 8, 28 4, 24 10"/>
  </g>

  <!-- Berries / grapes cluster -->
  <g transform="translate(958 30)">
    <circle class="doodle" cx="10" cy="26" r="5"/>
    <circle class="doodle" cx="18" cy="22" r="5"/>
    <circle class="doodle-alt" cx="14" cy="30" r="5"/>
    <circle class="doodle-alt" cx="22" cy="28" r="4.5"/>
    <circle class="doodle-accent" cx="18" cy="16" r="4.5"/>
    <path class="leaf" d="M20 12 C24 6, 30 8, 26 14 Z"/>
    <path class="stem-soft" d="M14 10 L16 6"/>
  </g>

  <!-- Small bowl / nourishment hint -->
  <g transform="translate(1088 34)">
    <path class="doodle-accent" d="M4 28 C4 22, 28 22, 28 28 C26 34, 6 34, 4 28 Z"/>
    <path class="doodle-alt" d="M8 24 C12 20, 20 20, 24 24" fill="none"/>
    <ellipse class="leaf" cx="16" cy="18" rx="5" ry="2.5" transform="rotate(-8 16 18)"/>
  </g>
</svg>
